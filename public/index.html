<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Task Manager | Emerald Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html,
      body {
        background: #09090b; /* Zinc 950 */
      }
      [x-cloak] {
        display: none !important;
      }
      /* Emerald-styled native date picker icon */
      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0.6) sepia(1) saturate(5) hue-rotate(100deg);
        cursor: pointer;
      }
      /* Refined scrollbars for Zinc/Emerald theme */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #18181b; /* Zinc 900 */
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46; /* Zinc 700 */
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #10b981; /* Emerald 500 */
      }
    </style>
  </head>
  <body
    class="bg-zinc-950 min-h-screen text-zinc-100 selection:bg-emerald-500/30 selection:text-emerald-200"
  >
    <!-- AUTH SCREEN -->
    <div
      id="auth-screen"
      class="hidden min-h-screen flex items-center justify-center p-4"
    >
      <div
        class="w-full max-w-md bg-zinc-900 border border-zinc-800/50 shadow-2xl rounded-2xl p-8 backdrop-blur-md"
      >
        <div class="flex justify-center mb-4">
          <div
            class="bg-emerald-500/10 p-3 rounded-2xl border border-emerald-500/20"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-8 w-8 text-emerald-500"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"
              />
            </svg>
          </div>
        </div>
        <h1
          class="text-3xl font-black text-center mb-1 bg-gradient-to-br from-emerald-300 to-emerald-600 bg-clip-text text-transparent"
        >
          TaskHub
        </h1>
        <p class="text-center text-zinc-500 mb-8 text-sm font-medium">
          The premium team collaboration workspace.
        </p>

        <div class="flex bg-zinc-800/50 p-1 rounded-xl mb-6">
          <button
            id="tab-login"
            class="flex-1 py-2 text-sm font-bold rounded-lg transition-all bg-emerald-600 text-white shadow-lg shadow-emerald-900/20"
          >
            Login
          </button>
          <button
            id="tab-signup"
            class="flex-1 py-2 text-sm font-bold rounded-lg transition-all text-zinc-400 hover:text-zinc-200"
          >
            Register
          </button>
        </div>

        <form id="login-form" class="space-y-4">
          <div class="space-y-1">
            <label
              class="text-[10px] uppercase tracking-widest font-black text-zinc-500 ml-1"
              >Email Address</label
            >
            <input
              name="email"
              type="email"
              placeholder="name@company.com"
              required
              class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2.5 text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all"
            />
          </div>
          <div class="space-y-1">
            <label
              class="text-[10px] uppercase tracking-widest font-black text-zinc-500 ml-1"
              >Password</label
            >
            <input
              name="password"
              type="password"
              placeholder="••••••••"
              required
              class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2.5 text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all"
            />
          </div>
          <button
            class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-500 shadow-lg shadow-emerald-900/30 transition-all active:scale-[0.98] mt-2"
          >
            Sign In
          </button>
        </form>

        <form id="signup-form" class="space-y-4 hidden">
          <div class="space-y-1">
            <label
              class="text-[10px] uppercase tracking-widest font-black text-zinc-500 ml-1"
              >Full Name</label
            >
            <input
              name="name"
              placeholder="John Doe"
              required
              class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2.5 text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all"
            />
          </div>
          <div class="space-y-1">
            <label
              class="text-[10px] uppercase tracking-widest font-black text-zinc-500 ml-1"
              >Work Email</label
            >
            <input
              name="email"
              type="email"
              placeholder="name@company.com"
              required
              class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2.5 text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all"
            />
          </div>
          <div class="space-y-1">
            <label
              class="text-[10px] uppercase tracking-widest font-black text-zinc-500 ml-1"
              >Security Password</label
            >
            <input
              name="password"
              type="password"
              placeholder="Min. 6 characters"
              required
              minlength="6"
              class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2.5 text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all"
            />
          </div>
          <button
            class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-500 shadow-lg shadow-emerald-900/30 transition-all active:scale-[0.98] mt-2"
          >
            Create Account
          </button>
        </form>
        <p
          id="auth-error"
          class="mt-4 text-xs text-rose-400 text-center font-bold"
        ></p>
      </div>
    </div>

    <!-- APP SCREEN -->
    <div id="app-screen" class="hidden">
      <header
        class="bg-zinc-900/80 border-b border-zinc-800 sticky top-0 z-40 backdrop-blur-xl"
      >
        <div
          class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between"
        >
          <div class="flex items-center gap-2 group cursor-pointer">
            <div
              class="bg-emerald-500 rounded-lg p-1.5 shadow-lg shadow-emerald-500/20 group-hover:rotate-12 transition-transform"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 text-zinc-900"
                viewBox="0 0 20 20"
                fill="currentColor"
              >
                <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" />
                <path
                  fill-rule="evenodd"
                  d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z"
                  clip-rule="evenodd"
                />
              </svg>
            </div>
            <span class="text-xl font-black tracking-tighter text-white"
              >Task<span class="text-emerald-500">Hub</span></span
            >
          </div>
          <nav class="flex items-center gap-2 md:gap-6">
            <button
              data-view="dashboard"
              class="nav-btn text-sm font-bold text-zinc-400 hover:text-emerald-400 px-2 py-1 transition-colors"
            >
              Dashboard
            </button>
            <button
              data-view="projects"
              class="nav-btn text-sm font-bold text-zinc-400 hover:text-emerald-400 px-2 py-1 transition-colors"
            >
              Projects
            </button>
            <div class="h-4 w-[1px] bg-zinc-800 mx-1 hidden md:block"></div>
            <span
              id="user-name"
              class="text-xs font-black text-zinc-500 hidden md:inline uppercase tracking-widest"
            ></span>
            <button
              id="logout-btn"
              class="text-xs font-black uppercase tracking-widest text-rose-500 hover:text-rose-400 transition-colors"
            >
              Logout
            </button>
          </nav>
        </div>
      </header>

      <main
        id="main-content"
        class="max-w-6xl mx-auto p-4 md:p-8 animate-in fade-in slide-in-from-bottom-2 duration-500"
      ></main>
    </div>

    <!-- MODAL ROOT -->
    <div id="modal-root"></div>

    <script src="/app.js"></script>
    <script>
      // Tab switching logic for the landing page
      const tabLogin = document.getElementById("tab-login");
      const tabSignup = document.getElementById("tab-signup");
      const loginForm = document.getElementById("login-form");
      const signupForm = document.getElementById("signup-form");

      const activeCls = [
        "bg-emerald-600",
        "text-white",
        "shadow-lg",
        "shadow-emerald-900/20",
      ];
      const inactiveCls = ["text-zinc-400", "hover:text-zinc-200"];

      tabLogin.addEventListener("click", () => {
        tabLogin.classList.add(...activeCls);
        tabLogin.classList.remove(...inactiveCls);
        tabSignup.classList.remove(...activeCls);
        tabSignup.classList.add(...inactiveCls);
        loginForm.classList.remove("hidden");
        signupForm.classList.add("hidden");
      });

      tabSignup.addEventListener("click", () => {
        tabSignup.classList.add(...activeCls);
        tabSignup.classList.remove(...inactiveCls);
        tabLogin.classList.remove(...activeCls);
        tabLogin.classList.add(...inactiveCls);
        signupForm.classList.remove("hidden");
        loginForm.classList.add("hidden");
      });
    </script>
  </body>
</html>
